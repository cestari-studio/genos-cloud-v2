<div class="page-header">
  <h2>Biblioteca de Prompts</h2>
  <p class="text-helper">Coleção de SuperPrompts, MegaPrompts e Fix Prompts para desenvolvimento do genOS</p>
</div>

<div class="grid grid-4" style="margin-bottom:32px;">
  <div class="card stat-card">
    <div class="stat-value" data-stat="total">—</div>
    <div class="stat-label">Total de Prompts</div>
  </div>
  <div class="card stat-card">
    <div class="stat-value" data-stat="super">—</div>
    <div class="stat-label">SuperPrompts</div>
    <span class="tag tag-purple">Super</span>
  </div>
  <div class="card stat-card">
    <div class="stat-value" data-stat="mega">—</div>
    <div class="stat-label">MegaPrompts</div>
    <span class="tag tag-blue">Mega</span>
  </div>
  <div class="card stat-card">
    <div class="stat-value" data-stat="fix">—</div>
    <div class="stat-label">Fix Prompts</div>
    <span class="tag tag-red">Fix</span>
  </div>
</div>

<div id="prompts-datatable"></div>
