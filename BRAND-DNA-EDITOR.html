<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: #161616;
            color: #f4f4f4;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0;
        }

        /* Top Bar */
        .topbar {
            background: #1a1a1a;
            border-bottom: 1px solid #3a3a3a;
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .topbar-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .topbar-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #78a9ff;
        }

        .topbar-title p {
            font-size: 12px;
            color: #a8a8a8;
        }

        .topbar-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tenant-selector {
            position: relative;
        }

        .tenant-select {
            background: #262626;
            color: #f4f4f4;
            border: 1px solid #3a3a3a;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'IBM Plex Sans', sans-serif;
            min-width: 280px;
        }

        .tenant-select:hover {
            border-color: #78a9ff;
        }

        .tenant-select:focus {
            outline: none;
            border-color: #78a9ff;
            box-shadow: 0 0 0 3px rgba(120, 169, 255, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #262626;
            color: #f4f4f4;
            border: 1px solid #3a3a3a;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover {
            background: #323232;
            border-color: #78a9ff;
            color: #78a9ff;
        }

        button.primary {
            background: #78a9ff;
            color: #161616;
            border-color: #78a9ff;
        }

        button.primary:hover {
            background: #5a8dd1;
            border-color: #5a8dd1;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        /* Main Content */
        .main {
            padding: 30px;
        }

        .section {
            background: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .section-header {
            background: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 1px solid #3a3a3a;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .section-header:hover {
            background: #202020;
        }

        .section-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #78a9ff;
            margin: 0;
        }

        .section-toggle {
            font-size: 18px;
            color: #a8a8a8;
            transition: transform 0.2s ease;
        }

        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 20px;
            display: none;
        }

        .section:not(.collapsed) .section-content {
            display: block;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #78a9ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            background: #1a1a1a;
            color: #f4f4f4;
            border: 1px solid #3a3a3a;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #78a9ff;
            box-shadow: 0 0 0 3px rgba(120, 169, 255, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        /* Tag Input */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            padding: 10px;
            align-items: flex-start;
        }

        .tag {
            background: #78a9ff;
            color: #161616;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tag button {
            background: none;
            border: none;
            color: #161616;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            margin: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tag button:hover {
            background: rgba(22, 22, 22, 0.3);
        }

        .tag-input {
            background: none;
            border: none;
            color: #f4f4f4;
            padding: 6px;
            font-size: 12px;
            flex: 1;
            min-width: 150px;
        }

        .tag-input:focus {
            outline: none;
        }

        /* Grid for char limits */
        .char-limits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .char-limit-item {
            display: flex;
            flex-direction: column;
        }

        .char-limit-item label {
            font-size: 12px;
            color: #a8a8a8;
            margin-bottom: 6px;
        }

        .char-limit-item input {
            font-family: 'IBM Plex Mono', monospace;
        }

        /* JSON Editor */
        .json-editor {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
            background: #1a1a1a;
            color: #78a9ff;
        }

        /* Checkbox/Toggle */
        .toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #78a9ff;
        }

        /* Status Bar */
        .status-bar {
            background: #1a1a1a;
            border-top: 1px solid #3a3a3a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #a8a8a8;
        }

        .status-info {
            display: flex;
            gap: 20px;
        }

        /* Ultraprompt Section */
        .ultraprompt-section {
            background: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            margin-top: 30px;
            overflow: hidden;
        }

        .ultraprompt-header {
            background: #1a1a1a;
            padding: 15px 20px;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ultraprompt-header h3 {
            font-size: 15px;
            font-weight: 600;
            color: #78a9ff;
            margin: 0;
        }

        .ultraprompt-content {
            padding: 20px;
        }

        .ultraprompt-text {
            background: #1a1a1a;
            color: #f4f4f4;
            border: 1px solid #3a3a3a;
            padding: 15px;
            border-radius: 4px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'IBM Plex Mono', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .copy-button {
            background: #78a9ff;
            color: #161616;
        }

        .copy-button:hover {
            background: #5a8dd1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .topbar-controls {
                width: 100%;
                flex-direction: column;
            }

            .tenant-select {
                min-width: 100%;
            }

            .button-group {
                width: 100%;
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .char-limits-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #78a9ff;
            color: #161616;
            padding: 15px 20px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .two-column-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .two-column-grid {
                grid-template-columns: 1fr;
            }
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>

                    "strict_compliance": true,
                    "sample_posts": []
                }
            }
        };

        let currentTenant = null;
        let currentTenantId = null;

        // Initialize
        function init() {
            populateTenantSelect();
            generateUltraPrompt();
            setupEventListeners();
        }

        function populateTenantSelect() {
            const select = document.getElementById('tenantSelect');
            const tenants = Object.entries(TENANTS_DATA);
            tenants.forEach(([id, data]) => {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = data.tenant_name;
                select.appendChild(option);
            });
        }

        function setupEventListeners() {
            document.getElementById('tenantSelect').addEventListener('change', (e) => {
                if (e.target.value) {
                    loadTenant(e.target.value);
                }
            });

            document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
            document.getElementById('exportMdBtn').addEventListener('click', exportMarkdown);
            document.getElementById('exportTxtBtn').addEventListener('click', exportText);
            document.getElementById('exportAllBtn').addEventListener('click', exportAll);
            document.getElementById('copyJsonBtn').addEventListener('click', copyJSON);
            document.getElementById('copyUltraPromptBtn').addEventListener('click', copyUltraPrompt);
            document.getElementById('fileUpload').addEventListener('change', handleFileUpload);
        }

        function loadTenant(tenantId) {
            currentTenantId = tenantId;
            currentTenant = TENANTS_DATA[tenantId];
            renderEditor();
            updateStatus();
        }

        function renderEditor() {
            const main = document.getElementById('main');
            main.innerHTML = '';

            const dna = currentTenant.dna;

            // Identidade
            main.appendChild(createSection('Identidade', [
                createFormGroup('Persona Name', 'text', dna.persona_name, (v) => dna.persona_name = v),
                createFormGroup('Voice Description', 'textarea', dna.voice_description, (v) => dna.voice_description = v),
                createFormGroup('Language', 'text', dna.language, (v) => dna.language = v),
                createFormGroup('Regional Notes', 'textarea', dna.regional_notes || '', (v) => dna.regional_notes = v || null),
                createFormGroup('Generation Notes', 'textarea', dna.generation_notes, (v) => dna.generation_notes = v),
            ]));

            // Tom de Voz
            main.appendChild(createSection('Tom de Voz', [
                createFormGroup('Primary', 'text', dna.voice_tone.primary, (v) => dna.voice_tone.primary = v),
                createFormGroup('Secondary', 'text', dna.voice_tone.secondary, (v) => dna.voice_tone.secondary = v),
                createFormGroup('Tertiary', 'text', dna.voice_tone.tertiary, (v) => dna.voice_tone.tertiary = v),
            ]));

            // Personalidade
            main.appendChild(createTagSection('Personalidade', dna.personality_traits));

            // Valores da Marca
            main.appendChild(createTagSection('Valores da Marca', dna.brand_values));

            // Termos Obrigatórios
            main.appendChild(createTagSection('Termos Obrigatórios', dna.mandatory_terms));

            // Palavras Proibidas
            main.appendChild(createTagSection('Palavras Proibidas', dna.forbidden_words));

            // Regras de Conteúdo
            main.appendChild(createSection('Regras de Conteúdo', [
                createFormGroup('Content Rules (JSON)', 'textarea', JSON.stringify(dna.content_rules, null, 2), (v) => {
                    try { dna.content_rules = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Estratégia de Hashtags
            main.appendChild(createSection('Estratégia de Hashtags', [
                createFormGroup('Hashtag Strategy (JSON)', 'textarea', JSON.stringify(dna.hashtag_strategy, null, 2), (v) => {
                    try { dna.hashtag_strategy = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Pilares Editoriais
            main.appendChild(createTagSection('Pilares Editoriais', dna.editorial_pillars));

            // Público-Alvo
            main.appendChild(createSection('Público-Alvo', [
                createFormGroup('Target Audience (JSON)', 'textarea', JSON.stringify(dna.target_audience, null, 2), (v) => {
                    try { dna.target_audience = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Perfil do Público
            main.appendChild(createSection('Perfil do Público', [
                createFormGroup('Audience Profile (JSON)', 'textarea', JSON.stringify(dna.audience_profile, null, 2), (v) => {
                    try { dna.audience_profile = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Limites de Caracteres
            const charLimitsSection = document.createElement('div');
            charLimitsSection.className = 'section';
            charLimitsSection.innerHTML = `
                <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <h3>Limites de Caracteres</h3>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content"></div>
            `;

            const charLimitsContent = charLimitsSection.querySelector('.section-content');
            const charLimitsGrid = document.createElement('div');
            charLimitsGrid.className = 'char-limits-grid';

            Object.keys(dna.char_limits).forEach(key => {
                const item = document.createElement('div');
                item.className = 'char-limit-item';
                item.innerHTML = `
                    <label>${key}</label>
                    <input type="number" value="${dna.char_limits[key]}">
                `;
                item.querySelector('input').addEventListener('change', (e) => {
                    dna.char_limits[key] = parseInt(e.target.value);
                });
                charLimitsGrid.appendChild(item);
            });

            charLimitsContent.appendChild(charLimitsGrid);
            main.appendChild(charLimitsSection);

            // Paleta de Cores
            main.appendChild(createSection('Paleta de Cores', [
                createFormGroup('Color Palette (JSON)', 'textarea', JSON.stringify(dna.color_palette, null, 2), (v) => {
                    try { dna.color_palette = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Tipografia
            main.appendChild(createSection('Tipografia', [
                createFormGroup('Typography (JSON)', 'textarea', JSON.stringify(dna.typography, null, 2), (v) => {
                    try { dna.typography = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Referências e Benchmarks
            main.appendChild(createSection('Referências e Benchmarks', [
                createFormGroup('References (JSON)', 'textarea', JSON.stringify(dna.references_and_benchmarks, null, 2), (v) => {
                    try { dna.references_and_benchmarks = JSON.parse(v); } catch(e) { console.error(e); }
                }),
            ]));

            // Compliance
            const complianceSection = document.createElement('div');
            complianceSection.className = 'section';
            complianceSection.innerHTML = `
                <div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                    <h3>Compliance</h3>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content">
                    <div class="form-group">
                        <label><input type="checkbox" ${dna.strict_compliance ? 'checked' : ''}> Strict Compliance</label>
                    </div>
                </div>
            `;
            complianceSection.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
                dna.strict_compliance = e.target.checked;
            });
            main.appendChild(complianceSection);

            updateStatus();
        }

        function createSection(title, children) {
            const section = document.createElement('div');
            section.className = 'section';
            section.innerHTML = `<div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')"><h3>${title}</h3><span class="section-toggle">▼</span></div><div class="section-content"></div>`;
            const content = section.querySelector('.section-content');
            children.forEach(child => content.appendChild(child));
            return section;
        }

        function createFormGroup(label, type, value, onChange) {
            const group = document.createElement('div');
            group.className = 'form-group';

            let input;
            if (type === 'textarea') {
                input = document.createElement('textarea');
                input.value = value;
            } else {
                input = document.createElement('input');
                input.type = type;
                input.value = value;
            }

            input.addEventListener('change', (e) => onChange(e.target.value));
            input.addEventListener('blur', (e) => onChange(e.target.value));

            group.innerHTML = `<label>${label}</label>`;
            group.appendChild(input);
            return group;
        }

        function createTagSection(title, tags) {
            const section = document.createElement('div');
            section.className = 'section';

            const tagsCopy = [...tags];

            section.innerHTML = `<div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')"><h3>${title}</h3><span class="section-toggle">▼</span></div><div class="section-content"></div>`;

            const content = section.querySelector('.section-content');

            function renderTags() {
                const container = document.createElement('div');
                container.className = 'tag-input-container';

                tagsCopy.forEach((tag, idx) => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'tag';
                    tagEl.innerHTML = `${tag}<button onclick="event.stopPropagation()">×</button>`;
                    tagEl.querySelector('button').addEventListener('click', () => {
                        tagsCopy.splice(idx, 1);
                        renderTags();
                        updateSourceArray(title, tagsCopy);
                    });
                    container.appendChild(tagEl);
                });

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'tag-input';
                input.placeholder = 'Adicionar...';
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && input.value.trim()) {
                        tagsCopy.push(input.value.trim());
                        input.value = '';
                        renderTags();
                        updateSourceArray(title, tagsCopy);
                    }
                });
                container.appendChild(input);

                content.innerHTML = '';
                content.appendChild(container);
            }

            function updateSourceArray(sectionTitle, newTags) {
                const dna = currentTenant.dna;
                if (sectionTitle === 'Personalidade') dna.personality_traits = newTags;
                else if (sectionTitle === 'Valores da Marca') dna.brand_values = newTags;
                else if (sectionTitle === 'Termos Obrigatórios') dna.mandatory_terms = newTags;
                else if (sectionTitle === 'Palavras Proibidas') dna.forbidden_words = newTags;
                else if (sectionTitle === 'Pilares Editoriais') dna.editorial_pillars = newTags;
            }

            renderTags();
            return section;
        }

        function updateStatus() {
            const info = document.getElementById('tenantInfo');
            const completion = document.getElementById('completionStatus');

            if (currentTenant) {
                info.textContent = `${currentTenant.tenant_name} (${currentTenant.contact_email})`;
                const filledFields = Object.keys(currentTenant.dna).filter(k => currentTenant.dna[k]).length;
                const totalFields = Object.keys(currentTenant.dna).length;
                completion.textContent = `${Math.round((filledFields / totalFields) * 100)}% preenchido`;
            }

            document.getElementById('lastSaved').textContent = `Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
        }

        function exportJSON() {
            const json = JSON.stringify(currentTenant, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            downloadFile(blob, `${currentTenant.tenant_name}-dna.json`);
        }

        function exportMarkdown() {
            const dna = currentTenant.dna;
            let md = `# ${currentTenant.tenant_name} — Brand DNA\n\n`;
            md += `**Contact:** ${currentTenant.contact_email}\n\n`;

            md += `## Identidade\n`;
            md += `**Persona:** ${dna.persona_name}\n`;
            md += `**Voice:** ${dna.voice_description}\n`;
            md += `**Language:** ${dna.language}\n\n`;

            md += `## Tom de Voz\n`;
            md += `- Primary: ${dna.voice_tone.primary}\n`;
            md += `- Secondary: ${dna.voice_tone.secondary}\n`;
            md += `- Tertiary: ${dna.voice_tone.tertiary}\n\n`;

            md += `## Personalidade\n${dna.personality_traits.map(t => `- ${t}`).join('\n')}\n\n`;
            md += `## Valores\n${dna.brand_values.map(v => `- ${v}`).join('\n')}\n\n`;
            md += `## Termos Obrigatórios\n${dna.mandatory_terms.map(t => `- ${t}`).join('\n')}\n\n`;
            md += `## Palavras Proibidas\n${dna.forbidden_words.map(w => `- ${w}`).join('\n') || 'Nenhuma'}\n\n`;
            md += `## Pilares Editoriais\n${dna.editorial_pillars.map(p => `- ${p}`).join('\n')}\n\n`;

            const blob = new Blob([md], { type: 'text/markdown' });
            downloadFile(blob, `${currentTenant.tenant_name}-dna.md`);
        }

        function exportText() {
            const dna = currentTenant.dna;
            let txt = `BRAND DNA: ${currentTenant.tenant_name}\n`;
            txt += `================\n\n`;
            txt += `Contact: ${currentTenant.contact_email}\n\n`;
            txt += `Persona: ${dna.persona_name}\n`;
            txt += `Voice: ${dna.voice_description}\n`;
            txt += `Language: ${dna.language}\n\n`;
            txt += `Voice Tone:\n  Primary: ${dna.voice_tone.primary}\n  Secondary: ${dna.voice_tone.secondary}\n  Tertiary: ${dna.voice_tone.tertiary}\n\n`;
            txt += `Personality: ${dna.personality_traits.join(', ')}\n`;
            txt += `Brand Values: ${dna.brand_values.join(', ')}\n`;
            txt += `Mandatory Terms: ${dna.mandatory_terms.join(', ')}\n`;
            txt += `Forbidden Words: ${dna.forbidden_words.join(', ') || 'None'}\n`;
            txt += `Editorial Pillars: ${dna.editorial_pillars.join(', ')}\n`;

            const blob = new Blob([txt], { type: 'text/plain' });
            downloadFile(blob, `${currentTenant.tenant_name}-dna.txt`);
        }

        function exportAll() {
            const allData = {};
            Object.entries(TENANTS_DATA).forEach(([id, tenant]) => {
                allData[id] = tenant;
            });
            const json = JSON.stringify(allData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            downloadFile(blob, 'ALL_TENANTS_BRAND_DNA.json');
        }

        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`Exported: ${filename}`);
        }

        function copyJSON() {
            const json = JSON.stringify(currentTenant, null, 2);
            navigator.clipboard.writeText(json).then(() => {
                showToast('JSON copied to clipboard!');
            });
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    if (file.name.endsWith('.json')) {
                        const data = JSON.parse(event.target.result);
                        Object.assign(currentTenant.dna, data.dna || data);
                    } else if (file.name.endsWith('.md')) {
                        parseMarkdown(event.target.result);
                    } else if (file.name.endsWith('.txt')) {
                        parseText(event.target.result);
                    }
                    renderEditor();
                    showToast('File imported successfully!');
                } catch (err) {
                    console.error(err);
                    showToast('Error importing file');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function parseMarkdown(content) {
            const dna = currentTenant.dna;
            const lines = content.split('\n');
            let currentSection = '';

            lines.forEach(line => {
                if (line.startsWith('##')) {
                    currentSection = line.replace(/##\s+/g, '').trim();
                } else if (line.startsWith('- ')) {
                    const value = line.replace(/^-\s+/g, '').trim();
                    if (currentSection === 'Personalidade') dna.personality_traits.push(value);
                    else if (currentSection === 'Valores') dna.brand_values.push(value);
                    else if (currentSection === 'Termos Obrigatórios') dna.mandatory_terms.push(value);
                }
            });
        }

        function parseText(content) {
            // Simple key-value parsing
            const dna = currentTenant.dna;
            const lines = content.split('\n');
            lines.forEach(line => {
                const [key, ...valueParts] = line.split(':');
                const value = valueParts.join(':').trim();
                if (key === 'Persona') dna.persona_name = value;
                else if (key === 'Voice') dna.voice_description = value;
            });
        }

### DATABASE SCHEMA (Supabase)
\`\`\`sql
CREATE TABLE tenants_brand_dna (
  id UUID PRIMARY KEY,
  tenant_id UUID REFERENCES tenants(id),
  data JSONB,
  created_at TIMESTAMP,
  updated_at TIMESTAMP,
  updated_by UUID REFERENCES auth.users(id),

);

);

            document.getElementById('ultrapromptText').textContent = prompt;
        }

        function copyUltraPrompt() {
            const text = document.getElementById('ultrapromptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('UltraPrompt copied to clipboard!');
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        init();
    </script>
