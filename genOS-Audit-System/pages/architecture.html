      <h2>Authentication Flow</h2>
      <svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" class="architecture-diagram">
        <!-- Background -->
        <rect width="1200" height="750" fill="#161616"/>
        
        <!-- Title -->
        <text x="600" y="30" font-size="20" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">
          Authentication Flow - Wix to Supabase
        </text>

        <!-- MAIN FLOW -->
        <!-- Step 1: User in Wix -->
        <g id="step1">
          <rect x="50" y="80" width="150" height="70" fill="#33b1ff" rx="8"/>
          <text x="125" y="105" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">1. User</text>

        </g>

        <!-- Step 2: Login Button -->
        <g id="step2">
          <rect x="270" y="80" width="150" height="70" fill="#0f62fe" rx="8"/>
          <text x="345" y="105" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">2. Login</text>
          <text x="345" y="125" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Button</text>
          <text x="345" y="140" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Click</text>
        </g>

        <!-- Step 3: Auth Bridge -->
        <g id="step3">
          <rect x="490" y="80" width="150" height="70" fill="#fa4d56" rx="8"/>
          <text x="565" y="105" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">3. Auth Bridge</text>
          <text x="565" y="125" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Edge Function</text>
          <text x="565" y="140" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Gateway</text>
        </g>

        <!-- Step 4: Create User -->
        <g id="step4">
          <rect x="710" y="80" width="150" height="70" fill="#42be65" rx="8"/>
          <text x="785" y="105" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">4. Supabase</text>
          <text x="785" y="125" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">createUser</text>
          <text x="785" y="140" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Register</text>
        </g>

        <!-- Step 5: Sign In -->
        <g id="step5">
          <rect x="930" y="80" width="150" height="70" fill="#42be65" rx="8"/>
          <text x="1005" y="105" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">5. Sign In</text>
          <text x="1005" y="125" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">with Password</text>
          <text x="1005" y="140" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Authenticate</text>
        </g>

        <!-- Arrows between steps -->
        <path d="M 200 115 L 270 115" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 420 115 L 490 115" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 640 115 L 710 115" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 860 115 L 930 115" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

        <!-- SECOND ROW -->
        <!-- Step 6: JWT Token -->
        <g id="step6">
          <rect x="50" y="240" width="150" height="70" fill="#a56eff" rx="8"/>
          <text x="125" y="265" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">6. JWT Token</text>
          <text x="125" y="285" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">with app_metadata</text>
          <text x="125" y="300" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Session</text>
        </g>

        <!-- Step 7: React App -->
        <g id="step7">
          <rect x="270" y="240" width="150" height="70" fill="#0f62fe" rx="8"/>
          <text x="345" y="265" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">7. React App</text>
          <text x="345" y="285" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Receives Session</text>
          <text x="345" y="300" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Store in Context</text>
        </g>

        <!-- Step 8: RLS Enforces -->
        <g id="step8">
          <rect x="490" y="240" width="150" height="70" fill="#fa4d56" rx="8"/>
          <text x="565" y="265" font-size="13" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">8. RLS Policy</text>
          <text x="565" y="285" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Tenant Isolation</text>
          <text x="565" y="300" font-size="9" fill="#e8e8e8" text-anchor="middle" font-family="IBM Plex Sans">Data Security</text>
        </g>

        <!-- Arrows second row -->
        <path d="M 1005 150 L 125 240" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 200 275 L 270 275" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <path d="M 420 275 L 490 275" stroke="#6f6f6f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

        <!-- TOKEN REFRESH CYCLE -->
        <g id="refresh-cycle">
          <rect x="710" y="240" width="370" height="70" fill="#262626" stroke="#6f6f6f" stroke-width="1" rx="8"/>
          <text x="895" y="265" font-size="12" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Token Refresh Cycle</text>
          <text x="895" y="285" font-size="10" fill="#a8a8a8" text-anchor="middle" font-family="IBM Plex Sans">Auto-refresh quando token expira (60min) → Nova sessão gerada → RLS revalida acesso</text>
          <text x="895" y="300" font-size="9" fill="#888888" text-anchor="middle" font-family="IBM Plex Sans">Supabase mantém refresh token seguro</text>
        </g>

        <!-- DETAILED FLOW SECTIONS -->
        <!-- Auth Metadata Section -->
        <g id="metadata-section">
          <rect x="50" y="400" width="530" height="120" fill="#262626" stroke="#6f6f6f" stroke-width="1" rx="8"/>
          <text x="70" y="425" font-size="12" font-weight="bold" fill="#f4f4f4" font-family="IBM Plex Sans">JWT app_metadata inclui:</text>
          
          <rect x="70" y="440" width="480" height="65" fill="#1a1a1a" fill-opacity="0.6" rx="4" font-family="IBM Plex Sans" font-size="10" fill="#a8a8a8"/>
          <text x="80" y="457" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">• tenant_id: ID único do cliente (depth control)</text>
          <text x="80" y="475" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">• role: admin | manager | user (hierarquia)</text>
          <text x="80" y="493" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">• parent_tenant_id: Para multi-tenancy (agência → cliente)</text>
        </g>

        <!-- RLS Policy Section -->
        <g id="rls-section">
          <rect x="620" y="400" width="530" height="120" fill="#262626" stroke="#6f6f6f" stroke-width="1" rx="8"/>
          <text x="640" y="425" font-size="12" font-weight="bold" fill="#f4f4f4" font-family="IBM Plex Sans">RLS Policy Enforcement:</text>
          
          <rect x="640" y="440" width="480" height="65" fill="#1a1a1a" fill-opacity="0.6" rx="4" font-family="IBM Plex Sans" font-size="10" fill="#a8a8a8"/>
          <text x="650" y="457" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">SELECT: WHERE tenant_id = auth.jwt() ->> 'tenant_id'</text>
          <text x="650" y="475" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">INSERT/UPDATE: Validação de propriedade do tenant</text>
          <text x="650" y="493" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">DELETE: Apenas admin com tenant_id matching pode deletar</text>
        </g>

        <!-- FLOW DESCRIPTION -->
        <g id="flow-description">
          <rect x="50" y="580" width="1100" height="140" fill="#262626" stroke="#6f6f6f" stroke-width="1" rx="8"/>
          <text x="70" y="605" font-size="12" font-weight="bold" fill="#f4f4f4" font-family="IBM Plex Sans">Fluxo Detalhado:</text>
          
          <text x="70" y="630" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">1. User clica "Login" no Wix → 2. React chama wix-auth-bridge (Edge Function) com credenciais Wix</text>
          <text x="70" y="648" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">3. Auth-bridge valida com Wix API e faz proxy para Supabase → 4. Supabase cria usuário se não existe (admin.auth.admin.create_user())</text>
          <text x="70" y="666" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">5. Supabase executa signInWithPassword para gerar JWT → 6. JWT retorna com app_metadata contendo tenant_id, role, parent_tenant_id</text>
          <text x="70" y="684" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">7. React armazena session em Context/localStorage → 8. Todas as requisições incluem JWT header "Authorization: Bearer {token}"</text>
          <text x="70" y="702" font-size="10" fill="#a8a8a8" font-family="IBM Plex Sans">9. Supabase RLS policies validam tenant_id antes de qualquer operação de dados → 10. Token refresh automático antes da expiração (60min)</text>
        </g>

        <!-- Arrow markers -->
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">

        <!-- MAIN PIPELINE -->
        <!-- Step 1: Create Post -->
        <g id="pub-step1">
          <rect x="50" y="80" width="140" height="70" fill="#0f62fe" rx="8"/>
          <text x="120" y="105" font-size="12" font-weight="bold" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">1. Create</text>
          <text x="120" y="125" font-size="11" fill="#f4f4f4" text-anchor="middle" font-family="IBM Plex Sans">Post</text>
